<h2>Welcome {{ user }}</h2>

<a href="/add">Add Student</a> |
<a href="/logout">Logout</a>

<h3>Student List</h3>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Action</th>
    </tr>

    {% for s in students %}
    <tr>
        <td>{{ s[0] }}</td>
        <td>{{ s[1] }}</td>
        <td>{{ s[2] }}</td>
        <td>
            <a href="/edit/{{ s[0] }}">Edit</a> |
            <a href="/delete/{{ s[0] }}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
